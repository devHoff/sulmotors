<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>SulMotor — Compre e Venda Carros com Segurança</title>
    <meta name="title"       content="SulMotor — Compre e Venda Carros com Segurança" />
    <meta name="description" content="O marketplace automotivo do Sul do Brasil. Encontre carros usados e seminovos com segurança. Anuncie grátis e venda rápido." />
    <meta name="keywords"    content="carros usados, comprar carro, vender carro, carros seminovos, marketplace automotivo, SulMotor, carros Sul do Brasil" />
    <meta name="robots"      content="index, follow" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="author"      content="SulMotor" />
    <link rel="canonical"    href="https://sulmotor.com.br/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://sulmotor.com.br/" />
    <meta property="og:site_name"   content="SulMotor" />
    <meta property="og:title"       content="SulMotor — Compre e Venda Carros com Segurança" />
    <meta property="og:description" content="O marketplace automotivo do Sul do Brasil. Carros usados e seminovos com segurança e praticidade." />
    <meta property="og:image"       content="https://sulmotor.com.br/og-default.jpg" />
    <meta property="og:locale"      content="pt_BR" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://sulmotor.com.br/" />
    <meta name="twitter:title"       content="SulMotor — Compre e Venda Carros com Segurança" />
    <meta name="twitter:description" content="O marketplace automotivo do Sul do Brasil. Carros usados e seminovos com segurança." />
    <meta name="twitter:image"       content="https://sulmotor.com.br/og-default.jpg" />

    <!-- Favicon assets -->
    <link rel="icon"             type="image/x-icon" href="/favicon.ico" />
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon"             type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SulMotor",
      "url": "https://sulmotor.com.br",
      "logo": "https://sulmotor.com.br/apple-touch-icon.png",
      "description": "Marketplace automotivo do Sul do Brasil",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "contato@sulmotor.com"
      },
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: WebSite (enables Sitelinks Searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SulMotor",
      "url": "https://sulmotor.com.br",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://sulmotor.com.br/estoque?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
      html { background: #0a0a0a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

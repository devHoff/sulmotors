name: Cron – Update Listing Scores

# ─────────────────────────────────────────────────────────────────────────────
# Recalculates ranking scores for all active listings.
# Calls the Supabase SQL function update_all_listing_scores() via the API.
#
# Formula: score = boost_score + recency_score + (views*0.5) + (favorites*1.5)
#
# Schedule: every hour
# Primary scheduler: in-process node-cron (update-listing-scores.js)
# This workflow is a REDUNDANT FAILSAFE for serverless deployments.
#
# Required secrets:
#   CRON_SECRET_KEY   — matches CRON_SECRET_KEY env var on server
#   PAYMENT_API_URL   — e.g. https://api.sulmotor.com.br
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

concurrency:
  group: cron-update-scores
  cancel-in-progress: false

jobs:
  update-listing-scores:
    name: Update listing ranking scores
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set API URL
        id: vars
        run: |
          API_URL="${{ secrets.PAYMENT_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://api.sulmotor.com.br"
            echo "⚠️ PAYMENT_API_URL not set, using default: $API_URL"
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Target: $API_URL/api/cron/update-scores"

      - name: POST /api/cron/update-scores
        id: cron_call
        run: |
          echo "⏱ $(date -u '+%Y-%m-%dT%H:%M:%SZ') — calling update-scores…"

          HTTP_CODE=$(curl \
            --silent --show-error \
            --max-time 60 --retry 2 --retry-delay 10 --retry-connrefused \
            --output /tmp/cron_response.json \
            --write-out "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET_KEY }}" \
            "${{ steps.vars.outputs.api_url }}/api/cron/update-scores"
          )

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/cron_response.json || echo "(empty)"

          UPDATED=$(cat /tmp/cron_response.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('updated_count',0))" \
            2>/dev/null || echo "unknown")

          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "updated_count=$UPDATED" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ cron endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ update_all_listing_scores executed. updated_count=$UPDATED"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Cron – Update Listing Scores"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Executed at** | \`$(date -u '+%Y-%m-%dT%H:%M:%SZ')\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` |"
            echo "| **HTTP status** | \`${{ steps.cron_call.outputs.http_code }}\` |"
            echo "| **Updated listings** | \`${{ steps.cron_call.outputs.updated_count }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        run: |
          echo "🚨 update_all_listing_scores failed"
          echo "   HTTP code: ${{ steps.cron_call.outputs.http_code }}"
          exit 1

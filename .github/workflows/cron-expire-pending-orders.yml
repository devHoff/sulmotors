name: Cron – Expire Pending Orders

# ─────────────────────────────────────────────────────────────────────────────
# Expires payment orders that have been in 'pending' status for > 24 hours.
# Calls the Supabase SQL function expire_pending_orders() via the API.
#
# Schedule: every 30 minutes
# Primary scheduler: in-process node-cron (expire-pending-orders.js)
# This workflow is a REDUNDANT FAILSAFE for serverless deployments.
#
# Required secrets:
#   CRON_SECRET_KEY   — matches CRON_SECRET_KEY env var on server
#   PAYMENT_API_URL   — e.g. https://api.sulmotor.com.br
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

concurrency:
  group: cron-expire-pending-orders
  cancel-in-progress: false

jobs:
  expire-pending-orders:
    name: Expire pending orders (>24h)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Set API URL
        id: vars
        run: |
          API_URL="${{ secrets.PAYMENT_API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="https://api.sulmotor.com.br"
            echo "⚠️ PAYMENT_API_URL not set, using default: $API_URL"
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Target: $API_URL/api/cron/expire-pending-orders"

      - name: POST /api/cron/expire-pending-orders
        id: cron_call
        run: |
          echo "⏱ $(date -u '+%Y-%m-%dT%H:%M:%SZ') — calling expire-pending-orders…"

          HTTP_CODE=$(curl \
            --silent --show-error \
            --max-time 30 --retry 2 --retry-delay 5 --retry-connrefused \
            --output /tmp/cron_response.json \
            --write-out "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET_KEY }}" \
            "${{ steps.vars.outputs.api_url }}/api/cron/expire-pending-orders"
          )

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/cron_response.json || echo "(empty)"

          EXPIRED=$(cat /tmp/cron_response.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('expired_count',0))" \
            2>/dev/null || echo "unknown")

          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "expired_count=$EXPIRED" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ cron endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ expire_pending_orders executed. expired_count=$EXPIRED"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Cron – Expire Pending Orders"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Executed at** | \`$(date -u '+%Y-%m-%dT%H:%M:%SZ')\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` |"
            echo "| **HTTP status** | \`${{ steps.cron_call.outputs.http_code }}\` |"
            echo "| **Expired orders** | \`${{ steps.cron_call.outputs.expired_count }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        run: |
          echo "🚨 expire_pending_orders failed"
          echo "   HTTP code: ${{ steps.cron_call.outputs.http_code }}"
          exit 1
